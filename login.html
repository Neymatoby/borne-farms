<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borne Farms — Sign In</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="logo.png" sizes="auto" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest: #07503f;
      --forest-2: #0a6b54;
      --lime: #e8fe85;
      --bone: #f1efdf;
      --white: #ffffff;
      --charcoal: #212529;
      --graphite: #353535;
      --pewter: #6d6d6d;
      --error: #dc2626;
      --success: #059669;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: "Inter", system-ui, sans-serif; background: var(--bone); color: var(--charcoal); line-height: 1.52; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: var(--forest); text-decoration: none; }

    header { padding: 28px 0; text-align: center; }
    header img { height: 64px; display: inline-block; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 24px 60px; }
    .auth-card { background: var(--white); width: 100%; max-width: 440px; padding: 40px 36px; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .auth-card h1 { font-family: "Cormorant Garamond", Georgia, serif; font-size: 34px; font-weight: 400; color: var(--forest); margin-bottom: 6px; text-align: center; }
    .auth-card .subtitle { text-align: center; color: var(--pewter); font-size: 15px; margin-bottom: 28px; }

    .role-toggle { display: flex; gap: 8px; margin-bottom: 24px; background: var(--bone); padding: 5px; border-radius: 100px; }
    .role-toggle button { flex: 1; padding: 10px 16px; border: none; background: transparent; border-radius: 100px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--graphite); cursor: pointer; transition: all .2s ease; }
    .role-toggle button.active { background: var(--forest); color: var(--white); }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--graphite); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input { width: 100%; padding: 13px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s ease, box-shadow .2s ease; }
    .form-group input:focus { border-color: var(--forest); box-shadow: 0 0 0 3px rgba(7,80,63,.12); }
    .form-group input.error { border-color: var(--error); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: none; border-radius: 100px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .2s ease, transform .1s ease; }
    .btn-primary { background: var(--forest); color: var(--white); }
    .btn-primary:hover { background: var(--forest-2); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-secondary { background: transparent; border: 1px solid var(--moss); color: var(--forest); }

    .message { display: none; padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 18px; text-align: center; }
    .message.error { display: block; background: #fee2e2; color: var(--error); }
    .message.success { display: block; background: #d1fae5; color: var(--success); }

    .switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--pewter); }
    .switch a { font-weight: 600; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--pewter); margin-top: 18px; }
    .back-link:hover { color: var(--forest); }

    footer { padding: 24px; text-align: center; font-size: 13px; color: var(--pewter); }

    @media (max-width: 480px) {
      .auth-card { padding: 30px 24px; border-radius: 20px; }
      .auth-card h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="landing-arva.html"><img src="assets/borne-farms-logo-transparent.png" alt="Borne Farms"></a>
  </header>

  <main>
    <div class="auth-card">
      <h1 id="formTitle">Welcome back</h1>
      <p class="subtitle" id="formSubtitle">Sign in to manage your farm or investments.</p>

      <div class="role-toggle" id="roleToggle">
        <button type="button" data-role="farmer" class="active">Farmer</button>
        <button type="button" data-role="investor">Company / Investor</button>
      </div>

      <div class="message" id="message"></div>

      <form id="authForm">
        <div class="form-group" id="nameGroup" style="display:none;">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="e.g., Amina Bello" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign in</button>
      </form>

      <p class="switch" id="switchText">
        Don't have an account? <a href="#" id="switchLink">Create one</a>
      </p>

      <div style="text-align:center;">
        <a href="landing-arva.html" class="back-link">&larr; Back to home</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Borne Farms. A pastoral platform.</p>
  </footer>

  <script>
    const BACKEND_URL = 'http://127.0.0.1:5000';
    const params = new URLSearchParams(window.location.search);
    const urlRole = params.get('role');
    const redirect = params.get('redirect');

    let mode = 'login'; // 'login' or 'register'
    let role = urlRole === 'investor' ? 'investor' : 'farmer';

    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const authForm = document.getElementById('authForm');
    const submitBtn = document.getElementById('submitBtn');
    const nameGroup = document.getElementById('nameGroup');
    const switchText = document.getElementById('switchText');
    const switchLink = document.getElementById('switchLink');
    const messageEl = document.getElementById('message');
    const roleButtons = document.querySelectorAll('#roleToggle button');

    function updateRoleUI() {
      roleButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.role === role);
      });
      if (mode === 'login') {
        formTitle.textContent = role === 'farmer' ? 'Farmer sign in' : 'Investor sign in';
        formSubtitle.textContent = role === 'farmer'
          ? 'Manage your herd, feed, and farm operations.'
          : 'Access your portfolio, marketplace, and returns.';
      } else {
        formTitle.textContent = role === 'farmer' ? 'Create farmer account' : 'Create investor account';
        formSubtitle.textContent = 'Start tracking cattle, milk, and investments.';
      }
    }

    function setMode(newMode) {
      mode = newMode;
      nameGroup.style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('name').required = mode === 'register';
      submitBtn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
      switchText.innerHTML = mode === 'login'
        ? 'Don\'t have an account? <a href="#" id="switchLink">Create one</a>'
        : 'Already have an account? <a href="#" id="switchLink">Sign in</a>';
      document.getElementById('switchLink').addEventListener('click', (e) => {
        e.preventDefault();
        setMode(mode === 'login' ? 'register' : 'login');
      });
      updateRoleUI();
    }

    roleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        role = btn.dataset.role;
        updateRoleUI();
      });
    });

    switchLink.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('register');
    });

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + (type || '');
      if (type === 'success') setTimeout(() => { messageEl.className = 'message'; }, 4000);
    }

    async function backendFetch(endpoint, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      const res = await fetch(BACKEND_URL + endpoint, {
        ...options,
        headers: { ...headers, ...(options.headers || {}) },
        body: options.body ? JSON.stringify(options.body) : undefined
      });
      return res;
    }

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.className = 'message';
      submitBtn.disabled = true;
      submitBtn.textContent = mode === 'login' ? 'Signing in...' : 'Creating account...';

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim();

      try {
        const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
        const body = mode === 'login'
          ? { email, password }
          : { email, password, name: name || email.split('@')[0] };

        const res = await backendFetch(endpoint, { method: 'POST', body });
        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Something went wrong. Please try again.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
          return;
        }

        localStorage.setItem('borne_auth_token', data.token);
        localStorage.setItem('borne_user', JSON.stringify(data.user));
        localStorage.setItem('borne_role', role);

        showMessage(mode === 'login' ? 'Welcome back!' : 'Account created successfully!', 'success');

        setTimeout(() => {
          let dest = redirect;
          if (!dest) {
            dest = role === 'investor' ? 'dashboard.html#finance' : 'dashboard.html';
          }
          window.location.href = dest;
        }, 800);
      } catch (err) {
        showMessage('Could not reach the server. Please make sure the backend is running.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
      }
    });

    // Initialize
    updateRoleUI();
    setMode('login');
  </script>
</body>
</html>
